<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REGISTRATION FORM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="form.css" rel="stylesheet">

</head>
<body>

  <div class="container" id="form">
    <div class="form-container text-center">
      <h1 class="mb-4">SIGN IN</h1>
      <form id="registrationForm" action="data.txt" method="GET">
        <div class="mb-3">
          <label for="name" class="form-label">Name</label>
          <input id="name" type="text" class="form-control" placeholder="Enter your full name" required>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <input id="email" type="email" class="form-control" placeholder="Enter your email address" required>
        </div>
        <div class="mb-3">
          <label for="mobile_num" class="form-label">Mobile Number</label>
          <input id="mobile_num" type="tel" class="form-control" placeholder="Enter your mobile number" required>
        </div>
        <label for="gender" class="form-label">Gender</label>
        <div class="mb-3">
  
            <label>Gender:</label>
            <input type="radio" name="gender" value="male" required> Male
            <input type="radio" name="gender" value="female" required> Female
            <input type="radio" name="gender" value="other" required> Other
        </div>
        <div class="mb-3">
          <label for="dob" class="form-label">Date of Birth</label>
          <input id="dob" type="date" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-custom">REGISTER</button>
        <a href="index.html">Go back to Home</a>
      </form>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const form = document.getElementById("registrationForm");

      if (!localStorage.getItem("users")) {
        localStorage.setItem("users", JSON.stringify([]));
      }

      form.addEventListener("submit", function (event) {
        event.preventDefault();

        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        const mobile_num = document.getElementById("mobile_num").value;
        // Get selected gender radio button
        const gender = document.querySelector('input[name="gender"]:checked')?.value;

        const dob = document.getElementById("dob").value;

        const user = { name, email, mobile_num, gender, dob };

        // If gender is not selected, show an alert
        if (!gender) {
          alert("Please select a gender.");
          return;
        }

        let users = JSON.parse(localStorage.getItem("users"));
        users.push(user);
        localStorage.setItem("users", JSON.stringify(users));

        fetch("https://jsonplaceholder.typicode.com/posts", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(user),
        })
          .then((response) => response.json())
          .then((data) => console.log("User registered: ", data))
          .catch((error) => console.error("Error: ", error));

        form.reset();
        alert("User Registered Successfully!");
      });
    });
  </script>
</body>
</html>
